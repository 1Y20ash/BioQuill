<h2>Admin Panel</h2>
<link rel="stylesheet" href="style.css">


<button onclick="addProduct()">Add Product</button>
<nav>
    <h2>BioQuill 🖊️</h2>
    <div>
        <a href="index.html">Home</a>
        <a href="cart.html">Cart 🛒</a>
        <a href="login.html" id="loginLink">Login</a>
        <button onclick="logout()" id="logoutBtn">Logout</button>
    </div>
</nav>
<input id="name" placeholder="Product Name"><br>
<input id="price" placeholder="Price"><br>
<input id="stock" placeholder="Stock"><br>
<script>
function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const stock = document.getElementById("stock").value;

    if (!name || !price || !stock) {
        alert("All fields required");
        return;
    }

    fetch("https://bioquill-backend.onrender.com/products", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name,
            price,
            stock,
            description: "Admin added product"
        })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        
        // clear inputs
        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("stock").value = "";
    });
}
</script>
